<!DOCTYPE html>
<html>
<head>
<title>X Digital Cyber World</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#0a58ca;
color:white;
text-align:center;
padding:15px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:400px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#0a58ca;
color:white;
padding:10px;
border:none;
width:100%;
}

</style>
</head>

<body>

<header>
<h2>X Digital Cyber World</h2>
<p>Online Service Request</p>
</header>

<div class="container">

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="text" id="mobile" placeholder="Mobile Number" required>

<select id="service">
<option>SIM Port</option>
<option>PAN Card</option>
<option>Income Certificate</option>
<option>Caste Certificate</option>
<option>Smart TV Order</option>
</select>

<button type="submit">Submit Request</button>

</form>

</div>

<script>

function sendWhatsApp(){

var name=document.getElementById("name").value;
var mobile=document.getElementById("mobile").value;
var service=document.getElementById("service").value;

var url="https://wa.me/917991679334?text="
+"Name:"+name+"%0a"
+"Mobile:"+mobile+"%0a"
+"Service:"+service;

window.open(url,'_blank');

}

</script>

</body>
</html>

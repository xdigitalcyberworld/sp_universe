<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>सिम पोर्ट बिल्कुल फ्री</title>

<style>

body{
font-family:"Noto Sans Devanagari",Arial;
background:#f2f2f2;
padding:10px;
margin:0;
}

.container{
width:100%;
max-width:420px;
background:white;
padding:18px;
border-radius:10px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
font-size:22px;
text-align:center;
margin-bottom:5px;
}

h2{
font-size:18px;
text-align:center;
margin-bottom:15px;
}

label{
font-size:14px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#25D366;
color:white;
border:none;
font-size:17px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.preview{
width:100%;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>📱 X Digital Cyber World</h1>
<h2>सिम पोर्ट बिल्कुल फ्री</h2>

<label>ग्राहक का नाम</label>
<input type="text" id="name" required>

<label>मोबाइल नंबर</label>
<input type="tel" id="mobile" maxlength="10" placeholder="10 अंकों का नंबर">

<label>आधार के अनुसार पूरा पता</label>
<textarea id="address"></textarea>

<label>वर्तमान सिम कंपनी</label>
<select id="company">
<option>Jio</option>
<option>Airtel</option>
<option>VI</option>
<option>BSNL</option>
</select>

<label>किस कंपनी में पोर्ट करना है</label>
<select id="portto">
<option>Jio</option>
<option>Airtel</option>
<option>VI</option>
<option>BSNL</option>
</select>

<label>क्या सिम 90 दिन पुराना है?</label>
<select id="days">
<option>हाँ</option>
<option>नहीं</option>
</select>

<label>क्या सिम में रिचार्ज है?</label>
<select id="recharge">
<option>हाँ</option>
<option>नहीं</option>
</select>

<label>आधार कार्ड फोटो</label>
<input type="file" id="aadhaar" accept="image/*" capture="environment">

<img id="preview" class="preview">

<button onclick="sendWhatsApp()">सबमिट करें</button>

</div>

<script>

document.getElementById("aadhaar").onchange=function(e){

var reader=new FileReader();
reader.onload=function(){
document.getElementById("preview").src=reader.result;
}

reader.readAsDataURL(e.target.files[0]);

}

function sendWhatsApp(){

var name=document.getElementById("name").value;
var mobile=document.getElementById("mobile").value;
var address=document.getElementById("address").value;
var company=document.getElementById("company").value;
var portto=document.getElementById("portto").value;
var days=document.getElementById("days").value;
var recharge=document.getElementById("recharge").value;

if(mobile.length!=10){
alert("कृपया 10 अंकों का मोबाइल नंबर डालें");
return;
}

var message=
"📱 सिम पोर्ट रिक्वेस्ट%0A%0A"+
"नाम: "+name+"%0A"+
"मोबाइल नंबर: "+mobile+"%0A"+
"पता: "+address+"%0A"+
"वर्तमान कंपनी: "+company+"%0A"+
"पोर्ट कंपनी: "+portto+"%0A"+
"सिम 90 दिन पुराना: "+days+"%0A"+
"रिचार्ज है: "+recharge;

var whatsapp="https://wa.me/917991679334?text="+message;

window.open(whatsapp,'_blank');

}

</script>

</body>
</html>
